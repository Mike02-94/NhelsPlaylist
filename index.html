<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Covers - For You ♥</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Nhel's Playlist</h1>
        <p class="subtitle">Made with love, just for you ♥</p>
    </header>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search for a song...">
    </div>

    <div class="container">
        <div class="playlist" id="playlist"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <p>No songs found</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
